<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THẦN TÀI ĐÂU - SECRET ENGINE V41</title>
    <style>
        :root {
            --bg-color: #0b101a; --card-bg: #121827; --pill-bg: #090e17; --border-dim: #1f2937;
            --text-main: #f3f4f6; --text-muted: #6b7280; --glow-blue: #06b6d4; --glow-cyan: #3b82f6;
            --glow-green: #10b981; --glow-purple: #a855f7; --glow-gold: #fbbf24; --fail-color: #ef4444;
            --gauge-bg: #1e293b;
        }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .container { width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; padding-bottom: 90px; }
        .profile-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; padding-top: 10px; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 40px; height: 40px; background: linear-gradient(135deg, var(--glow-gold), #b45309); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; color: #fff; }
        .user-name { font-weight: bold; font-size: 16px; margin: 0 0 2px 0; }
        .tier-badge { background: rgba(255,255,255,0.1); color: #9ca3af; font-size: 10px; padding: 2px 6px; border-radius: 4px; display: inline-block; }
        
        .app-title { text-align: center; color: var(--glow-gold); font-size: 32px; font-weight: 900; margin: 10px 0; line-height: 1.2; text-shadow: 0 0 20px rgba(251, 191, 36, 0.3); }
        .app-sub { text-align: center; color: #9ca3af; font-size: 13px; line-height: 1.5; margin-bottom: 15px;}
        
        .date-display { text-align: center; color: #3b82f6; font-weight: bold; font-size: 16px; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px;}

        .tab-container { display: flex; gap: 8px; margin-bottom: 20px; background: var(--card-bg); padding: 5px; border-radius: 14px; border: 1px solid var(--border-dim);}
        .tab-btn { flex: 1; background: transparent; color: var(--text-muted); border: none; padding: 12px 0; border-radius: 10px; font-weight: bold; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .tab-btn.active { background: rgba(6, 182, 212, 0.15); color: var(--glow-blue); box-shadow: 0 0 10px rgba(6, 182, 212, 0.1); }

        #tabMatrixContent, #tabSingleContent { display: none; flex-direction: column; animation: fadeIn 0.3s; }
        
        .btn-auto { background: linear-gradient(135deg, #10b981, #059669); color: white; font-weight: 900; padding: 16px; border: none; border-radius: 12px; width: 100%; cursor: pointer; margin-bottom: 15px; text-transform: uppercase; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); font-size: 14px; transition: 0.2s;}
        .btn-auto:active { transform: scale(0.98); }

        #soVe { width: 100%; height: 100px; background: rgba(0,0,0,0.3); border: 1px dashed var(--glow-cyan); border-radius: 12px; padding: 15px; box-sizing: border-box; color: white; font-size: 14px; text-align: center; resize: none; outline: none; margin-bottom: 10px; display: none; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);}
        #soVe:focus { border-color: var(--glow-blue); box-shadow: 0 0 15px rgba(6,182,212,0.2), inset 0 0 10px rgba(0,0,0,0.5); }
        
        .btn-action { background: linear-gradient(135deg, var(--glow-cyan), var(--glow-blue)); color: white; font-weight: bold; padding: 14px; border: none; border-radius: 12px; width: 100%; cursor: pointer; margin-bottom: 20px; display: none; text-transform: uppercase; font-size: 14px; box-shadow: 0 4px 15px rgba(6, 182, 212, 0.3);}
        .btn-action:active { transform: scale(0.98); }

        #matrixContainer { display: none; width: 100%; }
        .matrix-board { background: var(--card-bg); border-radius: 16px; padding: 20px 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 25px; border: 1px solid var(--border-dim);}
        .board-header { text-align: center; color: #60a5fa; font-weight: 900; font-size: 16px; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px;}
        .prize-row { display: flex; align-items: flex-start; border-bottom: 1px dashed rgba(255,255,255,0.05); padding: 10px 0; }
        .prize-row:last-child { border-bottom: none; }
        .prize-name { width: 65px; color: var(--text-muted); font-size: 12px; font-weight: 600; padding-top: 6px; }
        .prize-numbers { flex: 1; display: flex; flex-wrap: wrap; gap: 6px; }
        
        .pill { background: var(--pill-bg); border: 1px solid var(--border-dim); color: #d1d5db; font-family: monospace; font-weight: bold; font-size: 14px; padding: 5px 10px; border-radius: 20px; transition: 0.2s; }
        .pill.vip { border-color: var(--glow-blue); color: #60a5fa; background: rgba(59, 130, 246, 0.1); box-shadow: 0 0 10px rgba(59, 130, 246, 0.4); cursor: pointer; }
        .pill.vip:active { transform: scale(0.95); }

        .single-input-wrapper { background: var(--card-bg); border-radius: 16px; padding: 30px 20px; text-align: center; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid var(--border-dim); }
        .single-input { background: rgba(0,0,0,0.2); border: 1px solid rgba(6, 182, 212, 0.3); border-radius: 12px; color: white; font-family: monospace; font-size: 36px; font-weight: bold; letter-spacing: 12px; width: 100%; text-align: center; padding: 15px 0; outline: none; box-sizing: border-box; box-shadow: inset 0 0 15px rgba(0,0,0,0.5); transition: 0.3s; }
        .single-input:focus { border-color: var(--glow-blue); box-shadow: 0 0 15px rgba(6,182,212,0.2), inset 0 0 15px rgba(0,0,0,0.5); }
        .input-status { color: var(--text-muted); font-size: 13px; margin-top: 15px; }

        .gauge-container { background: var(--gauge-bg); border-radius: 10px; height: 12px; position: relative; overflow: hidden; margin: 15px 0; display: none; border: 1px solid rgba(255,255,255,0.1); }
        .gauge-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #ef4444 0%, #fbbf24 50%, #10b981 100%); transition: width 0.5s ease-out; }
        .gauge-text { color: var(--glow-green); font-weight: 900; font-size: 14px; text-transform: uppercase; margin-bottom: 10px; display: none; }

        #singleRulesList { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        @media (max-width: 400px) { #singleRulesList { grid-template-columns: 1fr; } }
        
        .rule-card { background: var(--card-bg); border: 1px solid var(--border-dim); border-radius: 12px; padding: 14px; text-align: left; border-left: 3px solid var(--border-dim); display: flex; flex-direction: column; }
        .rule-card.matched { border-color: rgba(16, 185, 129, 0.4); border-left: 3px solid var(--glow-green); background: rgba(16, 185, 129, 0.05); }
        .rule-header { display: flex; align-items: center; margin-bottom: 6px; }
        .rule-title { color: white; font-weight: bold; font-size: 13px; }
        .rule-badge { background: rgba(16, 185, 129, 0.15); color: var(--glow-green); font-size: 10px; font-weight: 800; padding: 2px 6px; border-radius: 4px; margin-left: auto; text-transform: uppercase; }
        .rule-desc { color: var(--text-muted); font-size: 11px; line-height: 1.4; flex-grow: 1; }

        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #0d131f; border-top: 1px solid #1f2937; padding: 15px; display: flex; justify-content: center; z-index: 50; }
        .bottom-bar-inner { width: 100%; max-width: 500px; display: flex; }
        .btn-fail { width: 100%; background: var(--fail-color); color: white; border: none; border-radius: 10px; font-weight: 900; padding: 15px 0; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3); cursor: pointer; transition: 0.2s;}
        .btn-fail:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-bar">
            <div class="user-info">
                <div class="avatar">VIP</div>
                <div><p class="user-name">Thần Tài Đâu</p><span class="tier-badge">SECRET ENGINE V41 🚀</span></div>
            </div>
        </div>

        <h1 class="app-title">THẦN TÀI<br>ĐÂU</h1>
        <p class="app-sub">Kết nối thẳng máy chủ Google. 100% Chống Chặn.</p>
        
        <div class="date-display" id="dateDisplay">Date: --/--/----</div>

        <div class="tab-container">
            <button class="tab-btn active" id="btnTabSingle" onclick="switchTab('single')">Nhập Số</button>
            <button class="tab-btn" id="btnTabMatrix" onclick="switchTab('matrix')">Bảng Đài</button>
        </div>

        <div id="tabSingleContent" style="display: flex;">
            <div class="single-input-wrapper">
                <div class="gauge-text" id="gaugeText">Vé Rác</div>
                <div class="gauge-container" id="gaugeBox"><div class="gauge-bar" id="gaugeFill"></div></div>

                <input type="text" class="single-input" id="singleNumInput" maxlength="6" placeholder="000000" oninput="quetSoLe()" autocomplete="off">
                <div class="input-status" id="singleStatus">Gõ đủ 6 số vào đây để gọi Thần Tài</div>
            </div>
            <div id="singleRulesList"></div>
        </div>

        <div id="tabMatrixContent">
            <button class="btn-auto" id="btnAutoFetch" onclick="autoFetchGoogle()">🚀 LẤY DATA BẰNG MÁY CHỦ GOOGLE</button>
            
            <textarea id="soVe" placeholder="NẾU CẦN THIẾT: Dán kết quả xổ số vào đây..."></textarea>
            <button class="btn-action" id="btnAction" onclick="quetBangMatrix()">🔍 PHÂN TÍCH DATA DÁN TAY</button>
            
            <div id="matrixContainer"></div>
        </div>
    </div>

    <div class="bottom-bar">
        <div class="bottom-bar-inner">
            <button class="btn-fail" onclick="location.reload()">MÃI ĐÉO THÀNH CÔNG (TẢI LẠI TRANG)</button>
        </div>
    </div>

<script>

    // ==========================================
    // DÁN LINK GOOGLE CỦA MÀY VÀO ĐÂY (Nằm giữa 2 dấu ngoặc kép)
    // Ví dụ: const MY_GOOGLE_API = "https://script.google.com/macros/s/AKfycb.../exec";
    // ==========================================
    const MY_GOOGLE_API = "https://script.google.com/macros/s/AKfycbzL5B040JdWavkjvlk7TOdAVSiRbENrAMHjZDslh5iYylgzS11ivLOnnWAkwgBmMoOY/exec"; 


    const rulesConfig = [
        { id: 'sanh', title: 'Law of Ascension', desc: 'Mạch khí kết nối sảnh 3+. Số ẩn Joker suy luận.', failDesc: 'Chưa đủ điều kiện kết nối mạch số.' },
        { id: 'amduong', title: 'Yin-Yang Harmony', desc: '5 số cuối thuần chẵn/lẻ.', failDesc: 'Năng lượng Âm Dương đang hỗn loạn.' },
        { id: 'batquai', title: 'Bagua Trigram Resonance', desc: 'Tỉ lệ Thái Cực cân bằng: 3 Chẵn - 3 Lẻ.', failDesc: 'Sóng năng lượng chưa đạt độ cân bằng.' },
        { id: 'tamtai', title: 'Trinity Recurrence (VIP)', desc: 'Cấu trúc lặp ABCABC.', failDesc: 'Chưa hình thành vòng lặp Tam Tài.' },
        { id: 'tinhtu', title: 'Twin Star Alignment (VIP)', desc: 'Cấu trúc AABXXY hoặc ABBXYY.', failDesc: 'Các vì sao tâm linh phân tán.' },
        { id: 'donganh', title: 'Shoulder Pole (VIP)', desc: 'Cấu trúc ABAXYX đối xứng.', failDesc: 'Trọng tâm phong thủy lệch trục.' },
        { id: 'cuucung', title: 'Nine Palaces (VIP)', desc: 'Số soi gương 2 chiều hoàn hảo.', failDesc: 'Không có sự phản chiếu Cửu Cung.' },
        { id: 'nguhanh', title: 'Five Elements Synergy (VIP)', desc: 'Cụm 2 số lệch +-1, 10, 11.', failDesc: 'Chưa kích hoạt cấu trúc Ngũ Hành.' },
        { id: 'thandinh', title: 'Deity\'s Convergence (VIP)', desc: 'Chứa luồng số Thần Tài (39, 79).', failDesc: 'Luồng số phân tán, chưa tụ Thần Dinh.' }
    ];

    const prizeKeys = ['P. TÁM', 'P. BẢY', 'P. SÁU', 'P. NĂM', 'P. TƯ', 'P. BA', 'P. NHÌ', 'P. NHẤT', 'P. Đ.BIỆT'];
    const prizeLengths = [2, 3, 4, 4, 5, 5, 5, 5, 6]; 
    const targetLengths = [1, 1, 3, 1, 7, 2, 1, 1, 1]; 

    window.onload = function() {
        let today = new Date();
        let dd = String(today.getDate()).padStart(2, '0');
        let mm = String(today.getMonth() + 1).padStart(2, '0');
        let yyyy = today.getFullYear();
        document.getElementById('dateDisplay').innerText = `Date: ${dd}-${mm}-${yyyy}`;
    }

    function switchTab(tab) {
        document.getElementById('btnTabSingle').classList.remove('active');
        document.getElementById('btnTabMatrix').classList.remove('active');
        document.getElementById('tabSingleContent').style.display = 'none';
        document.getElementById('tabMatrixContent').style.display = 'none';

        if (tab === 'matrix') {
            document.getElementById('btnTabMatrix').classList.add('active');
            document.getElementById('tabMatrixContent').style.display = 'flex';
        } else {
            document.getElementById('btnTabSingle').classList.add('active');
            document.getElementById('tabSingleContent').style.display = 'flex';
            document.getElementById("singleNumInput").focus();
        }
    }

    async function autoFetchGoogle() {
        if(MY_GOOGLE_API.includes("DÁN_LINK_GOOGLE_VÀO_ĐÂY")) {
            alert("Đại ca chưa dán link Google vào code kìa!");
            return;
        }

        const btn = document.getElementById("btnAutoFetch");
        btn.innerText = "⏳ GOOGLE ĐANG CÀO SỐ, CHỜ TÝ ĐẠI CA...";
        btn.style.opacity = "0.7";
        btn.style.pointerEvents = "none";

        try {
            // Lệnh Fetch tới máy chủ Google, chúa tể muôn loài đéo ai dám chặn
            let response = await fetch(MY_GOOGLE_API);
            let json = await response.json();
            
            if (json.status === 'success' && json.data && json.data.length > 0) {
                document.getElementById("soVe").style.display = "none";
                document.getElementById("btnAction").style.display = "none";
                renderMatrixBoards(json.data);
                
                btn.innerText = "✅ GOOGLE ĐÃ BƠM DATA VỀ THÀNH CÔNG";
                btn.style.background = "linear-gradient(135deg, #0ea5e9, #0284c7)";
            } else {
                throw new Error("Lỗi Server Google");
            }
        } catch (error) {
            btn.innerText = "❌ GOOGLE CŨNG ĐỨT! DÁN TAY VÀO Ô DƯỚI 👇";
            btn.style.background = "linear-gradient(135deg, #ef4444, #b91c1c)";
            document.getElementById("soVe").style.display = "block";
            document.getElementById("btnAction").style.display = "block";
            console.log(error);
        }
        btn.style.opacity = "1";
        btn.style.pointerEvents = "auto";
    }

    function quetBangMatrix() {
        let val = document.getElementById("soVe").value.trim();
        val = val.replace(/\b\d{1,3}([,.]\d{3})+\b/g, ' '); 
        const rawNums = val.match(/\b\d{2,6}\b/g);
        
        if (!rawNums) { alert("Chưa có số má gì hết trơn ba!"); return; }
        
        document.getElementById("soVe").style.display = "none";
        document.getElementById("btnAction").style.display = "none";
        document.getElementById("btnAutoFetch").style.display = "none";
        
        let stationsData = [];
        if (rawNums.length >= 18 && rawNums.length % 18 === 0) {
            let numStations = rawNums.length / 18;
            for(let s = 0; s < numStations; s++) {
                stationsData.push({ name: "STATION " + (s+1), nums: [] });
            }
            for(let i = 0; i < rawNums.length; i++) {
                let stIndex = i % numStations;
                stationsData[stIndex].nums.push(rawNums[i]);
            }
        } else {
            stationsData.push({ name: 'KẾT QUẢ TỔNG HỢP', nums: rawNums });
        }

        renderMatrixBoards(stationsData);
    }

    function showMatchedRules(num, rulesArrayStr) {
        let rulesArr = JSON.parse(rulesArrayStr);
        let rulesNames = rulesArr.map(id => {
            let found = rulesConfig.find(r => r.id === id);
            return found ? found.title : id;
        }).join('\\n- ');
        alert("🎉 VÉ " + num + " TRÚNG QUY LUẬT:\\n\\n- " + rulesNames);
    }

    function renderMatrixBoards(stationsArray) {
        let finalHtml = '';
        stationsArray.forEach(station => {
            let boardHtml = '';
            
            station.nums.forEach((num, index) => {
                if(num.length === 4 && num.startsWith('202')) return;
                
                let trueIndex = index % 18;
                let prizeGroupIndex = 0;
                let count = 0;
                for(let k=0; k<targetLengths.length; k++) {
                    count += targetLengths[k];
                    if(trueIndex < count) { prizeGroupIndex = k; break; }
                }
                
                let expectedLen = prizeLengths[prizeGroupIndex];
                let prizeName = prizeKeys[prizeGroupIndex];
                
                let cleanNum = num.slice(-expectedLen);
                let pObj = phanTichSo(cleanNum).active;
                let matchedRules = Object.keys(pObj);
                
                let isMatched = matchedRules.length > 0;
                let paddedNum = cleanNum.padStart(6, '0');
                
                let rulesJson = isMatched ? JSON.stringify(matchedRules).replace(/"/g, '&quot;') : '[]';
                let eventTag = isMatched ? `onclick="showMatchedRules('${paddedNum}', '${rulesJson}')"` : '';
                
                let htmlPill = `<div class="pill ${isMatched ? 'vip' : ''}" ${eventTag}>${paddedNum}</div>`;

                if (!boardHtml.includes(prizeName)) {
                    boardHtml += `<div class="prize-row"><div class="prize-name">${prizeName}</div><div class="prize-numbers" id="${station.name}-${prizeGroupIndex}">${htmlPill}</div></div>`;
                } else {
                    let tempDiv = document.createElement('div');
                    tempDiv.innerHTML = boardHtml;
                    tempDiv.querySelector(`#${station.name}-${prizeGroupIndex}`).innerHTML += htmlPill;
                    boardHtml = tempDiv.innerHTML;
                }
            });

            if (boardHtml !== '') {
                finalHtml += `<div class="matrix-board"><div class="board-header">${station.name}</div>${boardHtml}</div>`;
            }
        });

        const container = document.getElementById("matrixContainer");
        container.innerHTML = finalHtml; container.style.display = "block";
    }

    function quetSoLe() {
        let inputEl = document.getElementById("singleNumInput");
        inputEl.value = inputEl.value.replace(/\D/g, ''); 
        let num = inputEl.value; let statusEl = document.getElementById("singleStatus");
        const gaugeBox = document.getElementById("gaugeBox");
        const gaugeFill = document.getElementById("gaugeFill");
        const gaugeText = document.getElementById("gaugeText");

        if (num.length < 2) { 
            statusEl.innerText = "Gõ vé vào đi ba..."; statusEl.style.color = "var(--text-muted)"; document.getElementById("singleRulesList").innerHTML = ""; 
            gaugeBox.style.display = "none"; gaugeText.style.display = "none";
            return; 
        }

        gaugeBox.style.display = "block"; gaugeText.style.display = "block";
        statusEl.innerText = "Đang phân tích số từ Server VIP..."; statusEl.style.color = "var(--glow-gold)";
        
        let resultObj = phanTichSo(num); 
        let pObj = resultObj.active;
        let vipRulesCount = Object.keys(pObj).length;
        
        let isSuperVip = (pObj.nguhanh || pObj.tamtai || pObj.tinhtu || pObj.donganh || pObj.cuucung || pObj.thandinh);

        let score = 0;
        if(vipRulesCount > 0) score = Math.min(vipRulesCount * 15, 80); 
        if(isSuperVip) score = 99; 
        
        let pricingText = "Vé Rác";
        if(score >= 99) { pricingText = "💎 SIÊU VIP (VÔ GIÁ)"; gaugeText.style.color = "var(--glow-purple)"; }
        else if(score >= 60) { pricingText = "🔥 Cực Đẹp"; gaugeText.style.color = "var(--glow-green)"; }
        else if(score > 0) { pricingText = "✨ Tốt"; gaugeText.style.color = "var(--glow-cyan)"; }
        else { pricingText = "Vé Thường"; gaugeText.style.color = "var(--glow-gold)"; }
        
        gaugeText.innerText = pricingText; gaugeFill.style.width = score + "%";

        let rulesHtml = '';
        rulesConfig.forEach(rule => {
            let isMatched = pObj[rule.id];
            let cardClass = isMatched ? "rule-card matched" : "rule-card";
            let badgeHtml = isMatched ? `<span class="rule-badge">Matched!</span>` : '';
            let descText = isMatched ? rule.desc : rule.failDesc;
            rulesHtml += `<div class="${cardClass}"><div class="rule-header"><span class="rule-title">${rule.title}</span>${badgeHtml}</div><div class="rule-desc">${descText}</div></div>`;
        });
        document.getElementById("singleRulesList").innerHTML = rulesHtml;
    }

    function phanTichSo(strNum) {
        let active = {};
        let len = strNum.length;

        let zeros = (strNum.match(/0/g) || []).length;
        let uniqueDigits = [...new Set(strNum.replace(/0/g, '').split('').map(Number))].sort((a,b)=>a-b);
        let maxSanh = zeros > 0 ? zeros : 1; 

        for(let i=0; i<uniqueDigits.length; i++) {
            for(let j=i; j<uniqueDigits.length; j++) {
                let gapToFill = (uniqueDigits[j] - uniqueDigits[i] + 1) - (j - i + 1);
                if(gapToFill <= zeros) {
                    let currentLen = (uniqueDigits[j] - uniqueDigits[i] + 1) + (zeros - gapToFill);
                    if(currentLen > maxSanh) maxSanh = currentLen;
                }
            }
        }
        if (maxSanh >= 3) active['sanh'] = true;

        let amduongStr = len > 5 ? strNum.slice(-5) : strNum;
        let last5 = amduongStr.replace(/0/g, '');
        if(last5.length > 0) {
            let hasEven = false, hasOdd = false;
            for(let char of last5) {
                if(parseInt(char) % 2 === 0) hasEven = true; else hasOdd = true;
            }
            if((hasEven || hasOdd) && !(hasEven && hasOdd)) active['amduong'] = true;
        }

        if(len === 6) {
            let evens = 0, odds = 0;
            for(let char of strNum) {
                if(parseInt(char) % 2 === 0) evens++; else odds++;
            }
            if(evens === 3 && odds === 3) active['batquai'] = true;
        }

        let nguhanhMatched = false;
        if(len >= 4) {
            for(let i=0; i<=len-4; i++) {
                let n1 = parseInt(strNum.substring(i, i+2));
                let n2_adj = parseInt(strNum.substring(i+2, i+4)); 
                let diff1 = Math.abs(n1 - n2_adj);
                if(diff1 === 1 || diff1 === 10 || diff1 === 11) { nguhanhMatched = true; break; }
                
                if(i+5 <= len) {
                    let n2_sep = parseInt(strNum.substring(i+3, i+5)); 
                    let diff2 = Math.abs(n1 - n2_sep);
                    if(diff2 === 1 || diff2 === 10 || diff2 === 11) { nguhanhMatched = true; break; }
                }
            }
        }
        if(nguhanhMatched) active['nguhanh'] = true;

        if(len === 6 && strNum.slice(0,3) === strNum.slice(3,6)) active['tamtai'] = true;
        if(len === 5 && strNum.slice(0,2) === strNum.slice(3,5)) active['tamtai'] = true;

        if(len === 6) {
            let matchAABXXY = (strNum[0] === strNum[1] && strNum[1] !== strNum[2] && strNum[3] === strNum[4] && strNum[4] !== strNum[5]);
            let matchABBXYY = (strNum[0] !== strNum[1] && strNum[1] === strNum[2] && strNum[3] !== strNum[4] && strNum[4] === strNum[5]);
            if(matchAABXXY || matchABBXYY) active['tinhtu'] = true;
        }

        if(len === 6 && strNum[0]===strNum[2] && strNum[3]===strNum[5]) active['donganh'] = true;

        if(len >= 4 && strNum === strNum.split('').reverse().join('')) active['cuucung'] = true;

        if(strNum.includes('39') || strNum.includes('79')) active['thandinh'] = true;

        return { active };
    }
